<!DOCTYPE html>

<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">


<title>
Travel Guide
</title>


<link rel="stylesheet" href="style.css">


</head>


<body>


<header>

<h1>
🌍 Travel Guide
</h1>

<p>
나만의 여행 기록 앱
</p>

</header>



<main>


<section class="card">

<h2>
✈️ 여행 목록
</h2>


<div id="tripList">

</div>


<section class="card">

<h2>
💰 여행 비용 관리
</h2>


<p>
현재 사용 금액
</p>


<h3 id="totalExpense">
0 CNY
</h3>



<input 
id="expenseAmount"
placeholder="금액 (CNY)"
type="number"
>


<input
id="expenseMemo"
placeholder="사용 내용"
/>


<button onclick="addExpense()">

추가

</button>


<div id="expenseList">

</div>


</section>



<section id="tripDetail"
class="card hidden">


<h2 id="tripTitle"></h2>


<div id="schedule">

</div>


</section>


</main>



<script src="app.js"></script>


</body>

</html>
