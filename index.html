<!DOCTYPE html>

<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Travel Guide
</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>
🌍 Travel Guide
</h1>

<p>
나만의 여행 기록 앱
</p>

</header>



<main>


<section class="card">


<h2>
✈️ 여행 목록
</h2>


<div id="tripList">

불러오는 중...

</div>


</section>





<section id="tripDetail"
class="card hidden">


<h2 id="tripTitle">

</h2>


<p id="exchangeRate">

</p>



<h3>
📅 일정
</h3>


<div id="schedule">

</div>





<h3>
💰 여행 비용
</h3>


<h3 id="totalExpense">

0 CNY

</h3>


<p id="totalKRW">

0원

</p>



<input
id="expenseDate"
type="date"
>



<input
id="expenseAmount"
type="number"
placeholder="금액"
>



<input
id="expenseMemo"
placeholder="사용 내용"
>



<button onclick="addExpense()">

비용 추가

</button>



<div id="expenseList">

</div>



</section>



</main>



<script src="app.js"></script>


</body>


</html>
