<!DOCTYPE html>

<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">


<title>
Travel Guide
</title>


<link rel="stylesheet" href="style.css">


</head>


<body>


<header>

<h1>
🌍 Travel Guide
</h1>

<p>
나만의 여행 기록 앱
</p>

</header>



<main>


<section class="card">

<h2>
✈️ 여행 목록
</h2>


<div id="tripList">

</div>


<section id="tripDetail"
class="card hidden">


<h2 id="tripTitle"></h2>



<h3>
📅 일정
</h3>


<div id="schedule">

</div>



<h3>
💰 여행 비용
</h3>


<div id="expenseArea">


<h4 id="totalExpense">
0 CNY
</h4>


<input 
id="expenseAmount"
placeholder="금액(CNY)"
type="number"
>


<input
id="expenseMemo"
placeholder="내용"
/>


<button onclick="addExpense()">

비용 추가

</button>


<div id="expenseList">

</div>


</div>


</section>


</main>



<script src="app.js"></script>


</body>

</html>
