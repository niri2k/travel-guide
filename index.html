<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Guide</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-analytics-compat.js"></script>

    <link rel="stylesheet" href="style.css">
    <style>
        /* 하와이 해변 배경 설정 */
        body {
            background: linear-gradient(rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.7)),
                        url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
        }
    </style>
</head>

<body>

<header style="padding: 20px; background: rgba(255,255,255,0.8); border-bottom: 1px solid #e2e8f0;">
  <div style="display:flex; justify-content:space-between; align-items:center; max-width: 800px; margin: 0 auto;">
    <div>
      <h1 style="margin:0; font-size: 24px;">🌍 Travel Guide</h1>
      <h3 id="mainTitle" style="margin:5px 0 0 0; color: #475569;">사용자를 위한 실시간 여행 가이드 & 가계부</h3>
    </div>
    <div style="text-align:right; display:flex; align-items:center; gap:10px;">
      <span id="adminBadge" style="display:none; color: red; font-weight: bold;">👑 ADMIN</span>
      <span id="userInfo" class="hidden" style="color:#1e293b; font-weight:bold;"></span>
      <button id="loginBtn" onclick="openLoginModal()" style="background:#2563eb; color:white; padding:6px 14px; border-radius:12px; border:none; cursor:pointer;">로그인</button>
      <button id="logoutBtn" onclick="logout()" class="hidden" style="background:#475569; color:white; padding:6px 14px; border-radius:12px; border:none; cursor:pointer;">로그아웃</button>
    </div>
  </div>
</header>

<main style="max-width: 800px; margin: 20px auto; padding: 0 15px;">
    <section class="card">
        <h2>✈️ 여행 목록</h2>
        <div id="tripList">불러오는 중...</div>
    </section>

    <section id="tripDetail" class="card hidden">
        <h2 id="tripTitle"></h2>
        <p id="exchangeRate"></p>
        <h3>📅 일정</h3>
        <div id="schedule"></div>
        <h3>💰 여행 비용</h3>
        <h3 id="totalExpense">0 CNY</h3>
        <p id="totalKRW">0원</p>
        
        <div id="expenseList"></div>
        <div id="reviewList" style="margin-top: 25px;"></div>
    </section>
</main>

<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/exchange.js"></script>
<script src="js/expense.js"></script>
<script src="js/review.js"></script>
<script src="js/map.js"></script>
<script src="js/trip.js"></script>
<script src="js/floating.js"></script>
<script src="app.js"></script>

<div id="loginModal" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15,23,42,0.6); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; z-index:99999;">
  <div class="card" style="width:90%; max-width:400px; padding:30px; border-radius:24px; box-shadow:0 20px 40px rgba(0,0,0,0.3); background:white; position:relative;">
    <button onclick="closeLoginModal()" style="position:absolute; top:15px; right:15px; background:none; border:none; font-size:24px; color:#64748b; cursor:pointer;">&times;</button>
    <h3 style="margin-top:0; font-size:24px; font-weight:800; text-align:center; color:#0f172a;">🔐 클라우드 동기화</h3>
    <label>📧 이메일 주소</label>
    <input type="email" id="loginEmail" placeholder="example@email.com" style="margin-bottom:15px;">
    <label>🔑 비밀번호 (6자 이상)</label>
    <input type="password" id="loginPassword" placeholder="••••••">
    <div style="display:flex; gap:10px; margin-top:25px;">
      <button onclick="login()" style="flex:1; height:52px; background:#2563eb; color:white; font-size:16px; font-weight:700; border:none; border-radius:14px; cursor:pointer;">로그인</button>
      <button onclick="signUp()" style="flex:1; height:52px; background:#10b981; color:white; font-size:16px; font-weight:700; border:none; border-radius:14px; cursor:pointer;">회원가입</button>
    </div>
  </div>
</div>
    
</body>
</html>
