<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Travel Guide</title>
    
    <!-- Firebase SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-analytics-compat.js"></script>

    <link rel="stylesheet" href="style.css">

    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="favicon.png">

</head>

<body>

<!-- 상단 헤더 (iOS 글래스모피즘) -->
<header class="app-header">
  <div class="header-container">
    <div class="header-title">
      <h1>✈️ Travel Guide</h1>
      <h3 id="mainTitle">실시간 여행 가이드 & 가계부</h3>
    </div>
    <div class="header-actions">
      <span id="adminBadge" style="display:none;" class="badge-admin">👑 ADMIN</span>
      <span id="userInfo" class="hidden user-name"></span>
      <button id="loginBtn" type="button" onclick="openLoginModal()" class="btn-login">로그인</button>
      <button id="logoutBtn" type="button" onclick="logout()" class="hidden btn-logout">로그아웃</button>
    </div>
  </div>
</header>

<!-- 메인 콘텐츠 영역 -->
<main class="app-main">
    <!-- 1. 여행 목록 -->
    <section id="tripListSection" class="card-box">
        <div class="section-header">
          <h2>🌏 내 여행 목록</h2>
        </div>
        <div id="tripList">불러오는 중...</div>
    </section>

    <!-- 2. 여행 상세 보기 (일정 및 비용) -->
    <section id="tripDetail" class="card-box hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px;">
          <h2 id="tripTitle" style="margin: 0; color: #0F172A; font-size: 22px;"></h2>
          <button type="button" onclick="closeTripDetail()" class="btn-back">← 목록으로</button>
        </div>
        <p id="exchangeRate" class="sub-text"></p>
        
        <div class="divider"></div>
        
        <h3 class="sub-heading">📅 여행 일정</h3>
        <div id="schedule"></div>
        
        <div class="divider" style="margin-top: 30px;"></div>
        
        <h3 class="sub-heading">💰 여행 예산 현황</h3>
        <div class="budget-card">
          <span class="budget-label">총 사용 금액</span>
          <h3 id="totalExpense" class="budget-total">0 CNY</h3>
          <p id="totalKRW" class="budget-krw">0원</p>
        </div>
        
        <div id="expenseList"></div>
        <div id="reviewList" style="margin-top: 25px;"></div>
    </section>

    <!-- 3. 여행지 개별 상세 및 후기 페이지 -->
    <section id="placeDetailSection" class="card-box hidden">
        <button type="button" onclick="closePlaceDetail()" class="btn-back" style="margin-bottom: 15px;">← 일정으로 돌아가기</button>
        
        <!-- 여행지 이미지 및 상세 설명 영역 -->
        <div id="placeDetailContent"></div>

        <div class="divider"></div>

        <!-- 리뷰 작성 폼 -->
        <div id="reviewFormContainer" class="review-box">
          <h4 style="margin-top: 0; color:#0F172A; font-size: 16px;">✍️ 이 장소에 대한 생생한 후기 남기기</h4>
          <label class="form-label">별점 선택</label>
          <select id="reviewRating" class="form-select">
            <option value="5">⭐⭐⭐⭐⭐ (5점 - 최고예요! 강력 추천)</option>
            <option value="4">⭐⭐⭐⭐ (4점 - 좋았어요)</option>
            <option value="3">⭐⭐⭐ (3점 - 무난해요)</option>
            <option value="2">⭐⭐ (2점 - 기대보다 별로예요)</option>
            <option value="1">⭐ (1점 - 비추천합니다)</option>
          </select>
          <label class="form-label">후기 내용</label>
          <textarea id="reviewComment" rows="3" placeholder="다른 여행자들을 위해 입장 팁, 대기 시간, 좋았던 점을 적어주세요!" class="form-textarea"></textarea>
          <button type="button" onclick="submitReview()" class="btn-primary" style="margin-top: 12px; width: 100%;">후기 등록하기</button>
        </div>

        <!-- 리뷰 목록 -->
        <h3 class="sub-heading">💬 여행자 후기</h3>
        <div id="placeReviewList">불러오는 중...</div>
        
        <!-- 10개 더보기 버튼 -->
        <div style="text-align: center; margin-top: 20px;">
          <button id="loadMoreReviewsBtn" type="button" onclick="loadMoreReviews()" class="hidden btn-more">후기 10개 더보기 ↓</button>
        </div>
    </section>
</main>

<!-- 우측 하단 플로팅 액션 버튼 (로그인 전에는 hidden 처리) -->
<div class="fab-container hidden" id="fabContainer">
  <ul class="fab-menu" id="fabMenu" style="display: none;">
    <li class="fab-item" onclick="openExpenseForm(); toggleFab();"><span>💰 비용 추가</span><button type="button" class="fab-sub-btn">💰</button></li>
    <li class="fab-item" onclick="openScheduleForm(); toggleFab();"><span>📅 일정 추가</span><button type="button" class="fab-sub-btn">📅</button></li>
    <li class="fab-item" onclick="openPlaceForm(); toggleFab();"><span>📍 장소 추가</span><button type="button" class="fab-sub-btn">📍</button></li>
    <li class="fab-item" onclick="openReviewForm(); toggleFab();"><span>⭐ 후기 작성</span><button type="button" class="fab-sub-btn">⭐</button></li>
  </ul>
  <button type="button" class="fab-main-btn" id="fabToggle" onclick="toggleFab(event)">＋</button>
</div>

<!-- 로그인 모달 -->
<div id="loginModal" class="modal-overlay hidden">
  <div class="modal-card">
    <button type="button" onclick="closeLoginModal()" class="modal-close">×</button>
    <h3 style="text-align:center; margin-top:0; color:#0F172A; font-size: 20px;">🔐 클라우드 동기화</h3>
    
    <form onsubmit="event.preventDefault(); login();" style="margin: 0;">
      <label class="form-label">📧 이메일 주소</label>
      <input type="email" id="loginEmail" placeholder="example@email.com" autocomplete="username" required class="form-input" style="margin-bottom:15px;">
      
      <label class="form-label">🔑 비밀번호</label>
      <input type="password" id="loginPassword" placeholder="••••••" autocomplete="current-password" required class="form-input">
      
      <div style="display:flex; gap:10px; margin-top:25px;">
        <button type="submit" class="btn-primary" style="flex:1;">로그인</button>
        <button type="button" onclick="signUp()" class="btn-secondary" style="flex:1;">회원가입</button>
      </div>
    </form>
  </div>
</div>

<!-- 기능 자바스크립트 파일 로드 -->
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/exchange.js"></script>
<script src="js/expense.js"></script>
<script src="js/review.js"></script>
<script src="js/map.js"></script>
<script src="js/trip.js"></script>
<script src="js/place-detail.js"></script>
<script src="js/floating.js"></script>
<script src="app.js"></script>

</body>
</html>
